<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WQ</title>
    <meta
      name="description"
      content="WQ 的个人摄影网站。"
    />
    <link rel="stylesheet" href="styles/site.css" />
    <link rel="preload" as="image" type="image/webp" href="photos/hero/main.webp" imagesrcset="photos/hero/main-800.webp 800w, photos/hero/main.webp 1800w" imagesizes="(min-width: 900px) 38rem, calc(100vw - 2rem)" fetchpriority="high" />
    <script defer src="scripts/site.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="site-mark" href="index.html">WQ</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html" aria-current="page">Home</a>
          <a href="landscape/index.html">Landscape</a>
          <a href="da-butai/index.html">大舞台 の一歩</a>
          <a href="gallery/index.html">Polaroid</a>
          <a href="about.html">About</a>
        </nav>
      </header>

      <main>
        <section class="hero hero-only reveal">
          <div class="hero-visual hero-photo-wrap">
            <div class="photo-slot photo-tall tone-night" data-photo-slot>
              <picture>
                <source type="image/webp" srcset="photos/hero/main-800.webp 800w, photos/hero/main.webp 1800w" sizes="(min-width: 900px) 38rem, calc(100vw - 2rem)" />
                <source type="image/jpeg" srcset="photos/hero/main-800.jpg 800w, photos/hero/main.jpg 1800w" sizes="(min-width: 900px) 38rem, calc(100vw - 2rem)" />
                <img
                  src="photos/hero/main.jpg"
                  width="1800"
                  height="1800"
                  alt="首页主照片"
                  loading="eager"
                  decoding="async"
                  fetchpriority="high"
                  data-photo-image
                />
              </picture>
            </div>
          </div>
        </section>

      </main>

      <footer class="site-footer">
        <p>© 2026 Yuhao</p>
      </footer>
    </div>
  </body>
</html>
